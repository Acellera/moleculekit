name: Build docs

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"

      - name: Install docs deps
        run: uv sync --group docs --group test

      - name: Build HTML
        run: cd doc && uv run make html

      # Upload only on tag pushes or when the workflow is dispatched manually.
      - name: Set up Cloud SDK
        if: ${{ startsWith(github.event.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_DOCS }}
          service_account: ${{ secrets.GCP_DOC_SERVICE_ACCOUNT }}

      - name: Sync HTML to GCP docs bucket
        if: ${{ startsWith(github.event.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
        run: |
          gcloud storage rsync doc/build/html gs://software-acellera-final/moleculekit \
            --recursive \
            --delete-unmatched-destination-objects
